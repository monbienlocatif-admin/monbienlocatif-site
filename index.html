<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mon Bien Locatif</title>
    <meta name="description" content="Mon Bien Locatif - Immobilier premium et investissement." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #f6f1e8;
        --panel: #ffffff;
        --text: #1f1a17;
        --muted: #6b625b;
        --line: rgba(0,0,0,0.06);
        --dark: #1c1714;
        --accent: #b89666;
      }
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      a { color: inherit; text-decoration: none; }
      .container { width: min(1180px, calc(100% - 48px)); margin: 0 auto; }
      .site-header {
        position: sticky; top: 0; z-index: 50;
        background: rgba(246, 241, 232, 0.92);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--line);
      }
      .header-inner {
        display: flex; align-items: center; justify-content: space-between;
        padding: 18px 0;
        gap: 24px;
      }
      .brand-eyebrow {
        font-size: 11px; letter-spacing: .3em; text-transform: uppercase; color: var(--muted);
      }
      .brand-title { font-weight: 700; font-size: 16px; margin-top: 4px; }
      .nav { display: flex; align-items: center; gap: 28px; color: #504842; font-size: 14px; }
      .nav a:hover { color: var(--text); }
      .button {
        display: inline-flex; align-items: center; justify-content: center; gap: 10px;
        border-radius: 999px; padding: 15px 24px; font-size: 14px; font-weight: 600;
        transition: .2s ease; border: 1px solid transparent; cursor: pointer;
      }
      .button-primary { background: var(--dark); color: white; }
      .button-primary:hover { opacity: .92; }
      .button-secondary { background: white; border-color: #d9d1c7; color: var(--text); }
      .button-secondary:hover { background: #fbfaf8; }
      .hero {
        position: relative; overflow: hidden;
        background:
          radial-gradient(circle at top right, rgba(255,255,255,0.6), transparent 30%),
          radial-gradient(circle at left center, rgba(255,255,255,0.25), transparent 20%);
      }
      .hero-inner {
        display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 48px; align-items: center;
        padding: 84px 0 96px;
      }
      .eyebrow {
        font-size: 11px; letter-spacing: .32em; text-transform: uppercase; color: var(--muted); margin-bottom: 22px;
      }
      h1 {
        font-size: clamp(46px, 7vw, 78px); line-height: .95; letter-spacing: -0.05em; margin: 0;
      }
      .hero-text {
        font-size: clamp(18px, 2vw, 22px); line-height: 1.65; color: var(--muted); max-width: 760px; margin-top: 28px;
      }
      .hero-actions { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 34px; }
      .hero-card {
        min-height: 520px; border-radius: 34px; padding: 30px;
        background: linear-gradient(135deg, #191513 0%, #231d19 45%, #675646 100%);
        color: white; box-shadow: 0 30px 80px rgba(0,0,0,0.18);
        display: flex; flex-direction: column; justify-content: space-between;
      }
      .hero-badges { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .glass {
        border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.08);
        border-radius: 20px; padding: 16px;
      }
      .glass-small { color: rgba(255,255,255,0.9); }
      .glass-small .label,
      .insight-pill { font-size: 11px; letter-spacing: .24em; text-transform: uppercase; color: rgba(255,255,255,0.58); }
      .glass-small .value { margin-top: 12px; font-size: 18px; font-weight: 600; }
      .hero-insight {
        border-radius: 28px; padding: 28px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
      }
      .hero-insight h3 { font-size: 30px; line-height: 1.15; margin: 18px 0 0; }
      .hero-insight p { color: rgba(255,255,255,0.74); line-height: 1.7; margin-top: 18px; }
      .stats { padding: 18px 0 26px; }
      .stats-grid,
      .services-grid,
      .investment-grid,
      .portfolio-grid { display: grid; gap: 22px; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
      .card {
        background: white; border: 1px solid var(--line); border-radius: 30px; padding: 34px; box-shadow: 0 8px 30px rgba(0,0,0,0.04);
      }
      .stat-value { font-size: clamp(42px, 4vw, 56px); line-height: 1; letter-spacing: -0.04em; font-weight: 700; }
      .muted { color: var(--muted); line-height: 1.7; }
      section { padding: 82px 0; }
      .section-title { max-width: 760px; }
      .section-title.center { text-align: center; margin: 0 auto; }
      h2 { font-size: clamp(34px, 4vw, 58px); line-height: 1.05; letter-spacing: -0.04em; margin: 0; }
      .section-title p { margin-top: 18px; font-size: 18px; color: var(--muted); line-height: 1.7; }
      .services-grid,
      .investment-grid,
      .portfolio-grid { grid-template-columns: repeat(3, 1fr); margin-top: 44px; }
      .icon-wrap {
        width: 52px; height: 52px; display: inline-flex; align-items: center; justify-content: center;
        border-radius: 18px; background: #f3ede4; color: var(--text);
      }
      .service-title,
      .investment-title,
      .portfolio-title,
      .faq-question { font-size: 28px; line-height: 1.15; letter-spacing: -0.03em; margin-top: 22px; margin-bottom: 0; }
      .text-link { display: inline-flex; align-items: center; gap: 8px; margin-top: 28px; font-size: 14px; font-weight: 600; }
      .difference-grid { display: grid; grid-template-columns: 0.95fr 1.05fr; gap: 24px; align-items: start; }
      .dark-panel {
        background: var(--dark); color: white; border-radius: 34px; padding: 38px; box-shadow: 0 28px 80px rgba(0,0,0,0.16);
      }
      .dark-panel p { color: rgba(255,255,255,0.74); line-height: 1.7; }
      .pillars-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
      .soft-card { background: #fbf8f3; }
      .portfolio-visual {
        height: 230px; border-radius: 0; background: linear-gradient(135deg, #d1bea0, #a98e6b 55%, #7c6550);
      }
      .tag {
        display: inline-flex; border-radius: 999px; padding: 10px 16px; font-size: 14px; font-weight: 600;
        background: #f2ede5; border: 1px solid var(--line); color: #433c36; margin-top: 24px;
      }
      .network {
        background: white; border: 1px solid var(--line); border-radius: 38px; padding: 42px; box-shadow: 0 8px 30px rgba(0,0,0,0.04);
      }
      .network-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 26px; align-items: center; }
      .network-list { background: var(--dark); color: white; border-radius: 30px; padding: 30px; }
      .network-list ul { margin: 0; padding-left: 18px; }
      .network-list li { margin: 12px 0; color: rgba(255,255,255,0.84); line-height: 1.6; }
      .faq-wrap { max-width: 960px; margin: 44px auto 0; display: grid; gap: 16px; }
      .contact {
        background: var(--dark); color: white; border-radius: 38px; padding: 42px;
        box-shadow: 0 28px 80px rgba(0,0,0,0.18);
      }
      .contact-grid { display: grid; grid-template-columns: 1fr 0.95fr; gap: 30px; align-items: start; }
      .contact p { color: rgba(255,255,255,0.76); line-height: 1.7; }
      .form {
        display: grid; gap: 14px; padding: 24px; border-radius: 28px;
        background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      }
      .field,
      .textarea {
        width: 100%; border-radius: 14px; border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.1); color: white; padding: 14px 16px;
        font: inherit; outline: none;
      }
      .field::placeholder,
      .textarea::placeholder { color: rgba(255,255,255,0.38); }
      .textarea { min-height: 140px; resize: vertical; }
      footer { border-top: 1px solid var(--line); }
      .footer-inner { display: flex; justify-content: space-between; gap: 16px; padding: 28px 0 34px; color: var(--muted); font-size: 14px; }
      .footer-title { font-weight: 700; color: var(--text); margin-bottom: 4px; }
      .footer-links { display: flex; flex-wrap: wrap; gap: 18px; }
      @media (max-width: 1080px) {
        .hero-inner,
        .difference-grid,
        .network-grid,
        .contact-grid,
        .stats-grid,
        .services-grid,
        .investment-grid,
        .portfolio-grid { grid-template-columns: 1fr; }
        .pillars-grid { grid-template-columns: 1fr; }
        .nav { display: none; }
      }
      @media (max-width: 720px) {
        .container { width: min(100% - 28px, 1180px); }
        .header-inner { padding: 14px 0; }
        .hero-inner { padding: 52px 0 60px; }
        section { padding: 58px 0; }
        .card, .dark-panel, .network, .contact, .hero-card { padding: 24px; border-radius: 24px; }
        .hero-actions { flex-direction: column; align-items: stretch; }
        .button { width: 100%; }
        .footer-inner { flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
